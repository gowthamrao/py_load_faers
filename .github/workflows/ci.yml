name: CI

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:
  test-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          set-host: true
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipx
          python -m pipx ensurepath
          pipx install poetry
        shell: bash
      - name: Install dependencies
        run: poetry install
        shell: bash
      - name: Run linters
        run: |
          poetry run black --check .
          poetry run ruff .
        shell: bash
      - name: Run type checker
        run: poetry run mypy --strict .
        shell: bash
      - name: Run tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        run: poetry run pytest
        shell: bash

  test-macos:
    runs-on: macos-13
    needs: test-linux
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          set-host: true
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipx
          python -m pipx ensurepath
          pipx install poetry
        shell: bash
      - name: Install dependencies
        run: poetry install
        shell: bash
      - name: Run linters
        run: |
          poetry run black --check .
          poetry run ruff .
        shell: bash
      - name: Run type checker
        run: poetry run mypy --strict .
        shell: bash
      - name: Run tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        run: poetry run pytest
        shell: bash

  test-windows:
    runs-on: windows-latest
    needs: test-macos
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          set-host: true
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipx
          python -m pipx ensurepath
          pipx install poetry
        shell: bash
      - name: Install dependencies
        run: poetry install
        shell: bash
      - name: Run linters
        run: |
          poetry run black --check .
          poetry run ruff .
        shell: bash
      - name: Run type checker
        run: poetry run mypy --strict .
        shell: bash
      - name: Switch to Linux containers on Windows
        run: DockerCli.exe -SwitchDaemon
        shell: pwsh
      - name: Run tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        run: poetry run pytest
        shell: bash
